<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#0F0F0F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>FitTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F0F;
  --surface: #1A1A1A;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #F0F0F0;
  --muted: #888;
  --hint: #555;
  --accent: #C8F135;
  --accent-dim: rgba(200,241,53,0.12);
  --accent-text: #0F0F0F;
  --push: #9B8FFF;
  --push-bg: rgba(155,143,255,0.13);
  --pull: #5BB8FF;
  --pull-bg: rgba(91,184,255,0.13);
  --legs: #4ED894;
  --legs-bg: rgba(78,216,148,0.13);
  --run-long: #FFB84D;
  --run-long-bg: rgba(255,184,77,0.13);
  --run-speed: #FF7A5C;
  --run-speed-bg: rgba(255,122,92,0.13);
  --tennis: #FF9CE0;
  --tennis-bg: rgba(255,156,224,0.13);
  --swim: #4DD9E8;
  --swim-bg: rgba(77,217,232,0.13);
  --rest: #444;
  --rest-bg: rgba(80,80,80,0.1);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font-display);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex; flex-direction: column;
  height: 100%; width: 100%; max-width: 430px; margin: 0 auto;
  position: relative; overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  padding: calc(var(--safe-top) + 14px) 20px 12px;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  flex: 0 0 auto;
  z-index: 10;
}
.topbar-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.app-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.app-title span { color: var(--accent); }
.week-ctrl { display: flex; align-items: center; gap: 10px; }
.wbtn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: none;
  color: var(--text); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.wbtn:active { background: var(--surface2); }
.week-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.03em; }
.topbar-row2 { display: flex; gap: 8px; }
.stat-chip {
  background: var(--surface); border-radius: 20px;
  padding: 4px 12px; font-family: var(--font-mono); font-size: 11px; color: var(--muted);
}
.stat-chip b { color: var(--text); font-weight: 500; }
.stat-chip.accent-chip { background: var(--accent-dim); }
.stat-chip.accent-chip b { color: var(--accent); }

/* ── DAY STRIP ── */
.day-strip {
  display: flex; gap: 4px; padding: 10px 20px;
  background: var(--bg); border-bottom: 0.5px solid var(--border);
  overflow-x: auto; scrollbar-width: none; flex: 0 0 auto;
}
.day-strip::-webkit-scrollbar { display: none; }
.day-chip {
  flex: 0 0 auto; min-width: 46px; padding: 8px 4px;
  border-radius: 14px; text-align: center; cursor: pointer;
  border: 0.5px solid transparent; background: none;
  transition: background 0.15s;
}
.day-chip.active { background: var(--surface2); border-color: var(--border2); }
.day-chip.is-today .dc-num { color: var(--accent); }
.dc-name { font-family: var(--font-mono); font-size: 9px; color: var(--hint); display: block; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.dc-num { font-size: 16px; font-weight: 700; color: var(--muted); display: block; line-height: 1; }
.day-chip.active .dc-num, .day-chip.active .dc-name { color: var(--text); }
.dc-pips { display: flex; gap: 3px; justify-content: center; margin-top: 5px; }
.dc-pip { width: 4px; height: 4px; border-radius: 50%; background: var(--hint); }
.dc-pip.done { background: var(--accent); }
.dc-pip.pending { background: var(--border2); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1; overflow-y: auto; padding: 14px 16px calc(var(--safe-bottom) + 80px);
  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── CARDS ── */
.act-card {
  background: var(--surface); border-radius: 18px;
  border: 0.5px solid var(--border); margin-bottom: 10px;
  overflow: hidden; transition: border-color 0.15s;
}
.act-card.done-card { opacity: 0.55; }
.act-card.optional-card { border-style: dashed; background: transparent; }
.act-card.rest-card { border-style: solid; }

.card-main {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 14px 14px 14px; cursor: pointer;
  min-height: 72px;
}
.card-icon {
  width: 46px; height: 46px; border-radius: 14px; flex: 0 0 46px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.2s;
}
.card-title.struck { text-decoration: line-through; color: var(--hint); }
.card-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
.check-btn {
  width: 44px; height: 44px; border-radius: 50%; flex: 0 0 44px;
  border: 1.5px solid var(--border2); background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.check-btn svg { width: 18px; height: 18px; stroke: var(--hint); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
.check-btn.checked { background: var(--accent); border-color: var(--accent); }
.check-btn.checked svg { stroke: var(--accent-text); }
.check-btn:active { transform: scale(0.93); }

/* ── EXPAND ── */
.card-expand {
  border-top: 0.5px solid var(--border); padding: 14px 14px 16px;
  display: none;
}
.card-expand.open { display: block; }

.field-block { margin-bottom: 14px; }
.field-lbl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.field-row { display: flex; gap: 8px; align-items: center; }
.field-row input {
  flex: 1; min-width: 0; background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: 12px; padding: 11px 13px; font-size: 14px;
  color: var(--text); font-family: var(--font-display); outline: none;
  transition: border-color 0.15s;
}
.field-row input:focus { border-color: var(--accent); }
.field-unit { font-family: var(--font-mono); font-size: 11px; color: var(--hint); white-space: nowrap; }
.type-toggle { display: flex; gap: 6px; }
.type-toggle button {
  flex: 1; padding: 9px 6px; border-radius: 12px; border: 0.5px solid var(--border2);
  background: none; color: var(--muted); font-size: 12px; font-weight: 500;
  font-family: var(--font-display); cursor: pointer; transition: all 0.15s;
}
.type-toggle button.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

/* Exercise rows */
.ex-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 8px; }
.ex-row { display: flex; gap: 6px; align-items: center; }
.ex-row input {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 10px;
  padding: 9px 10px; font-size: 13px; color: var(--text); font-family: var(--font-display); outline: none;
}
.ex-row input:focus { border-color: var(--accent); }
.ex-name { flex: 3; }
.ex-num { flex: 1; min-width: 0; text-align: center; }
.ex-del { background: none; border: none; color: var(--hint); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; flex: 0 0 auto; }
.add-ex {
  width: 100%; border: 0.5px dashed var(--border2); border-radius: 10px;
  background: none; color: var(--muted); font-size: 12px; padding: 9px;
  font-family: var(--font-display); cursor: pointer;
}
.ex-header { display: grid; grid-template-columns: 3fr 1fr 1fr 28px; gap: 6px; margin-bottom: 5px; }
.ex-header span { font-family: var(--font-mono); font-size: 9px; color: var(--hint); letter-spacing: 0.05em; text-transform: uppercase; padding-left: 2px; }

/* Save row */
.save-row { display: flex; gap: 8px; margin-top: 14px; }
.save-row button {
  flex: 1; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 700;
  font-family: var(--font-display); cursor: pointer; border: 0.5px solid var(--border2);
  background: none; color: var(--muted); transition: all 0.15s;
}
.save-row button:active { transform: scale(0.97); }
.save-row .btn-del { color: var(--run-speed); border-color: rgba(255,122,92,0.25); }
.save-row .btn-del:active { background: rgba(255,122,92,0.1); }
.save-row .btn-save { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

/* Rest card */
.rest-inner {
  display: flex; align-items: center; gap: 14px; padding: 16px;
}
.rest-icon { font-size: 24px; width: 46px; text-align: center; }
.rest-text { font-size: 14px; font-weight: 700; color: var(--muted); }
.rest-sub { font-family: var(--font-mono); font-size: 11px; color: var(--hint); margin-top: 3px; }

/* Add button */
.add-act-btn {
  width: 100%; border: 1.5px dashed var(--border2); border-radius: 18px;
  padding: 16px; background: none; color: var(--muted); font-size: 14px;
  font-family: var(--font-display); cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px; margin-top: 4px;
  transition: border-color 0.15s, color 0.15s;
}
.add-act-btn:active { border-color: var(--accent); color: var(--accent); }
.add-icon { font-size: 20px; line-height: 1; }

/* Type picker */
.type-picker {
  background: var(--surface); border-radius: 18px;
  border: 0.5px solid var(--border2); padding: 16px; margin-top: 4px;
}
.picker-title { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
.picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.picker-btn {
  border-radius: 14px; padding: 14px 10px; border: 0.5px solid var(--border2);
  background: none; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 6px; transition: all 0.15s;
}
.picker-btn:active { background: var(--surface2); }
.picker-icon { font-size: 24px; }
.picker-label { font-size: 13px; font-weight: 700; color: var(--text); font-family: var(--font-display); }
.picker-cancel {
  width: 100%; margin-top: 8px; border-radius: 14px; padding: 12px;
  border: 0.5px solid var(--border); background: none; color: var(--hint);
  font-size: 13px; font-family: var(--font-display); cursor: pointer;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 16px calc(var(--safe-bottom) + 10px);
  background: var(--bg); border-top: 0.5px solid var(--border);
  display: flex; gap: 4px; z-index: 20;
}
.nav-tab {
  flex: 1; padding: 12px 4px 8px; display: flex; flex-direction: column;
  align-items: center; gap: 4px; cursor: pointer; background: none; border: none;
  border-radius: 12px; transition: background 0.15s;
}
.nav-tab.active .nav-icon { color: var(--accent); }
.nav-tab.active .nav-label { color: var(--accent); }
.nav-icon { font-size: 20px; color: var(--hint); }
.nav-label { font-family: var(--font-mono); font-size: 9px; color: var(--hint); letter-spacing: 0.04em; text-transform: uppercase; }

/* ── HISTORY VIEW ── */
.history-view { padding: 16px 16px calc(var(--safe-bottom) + 80px); }
.history-week { margin-bottom: 24px; }
.history-week-title {
  font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 10px; padding-left: 2px;
}
.history-day {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: 14px; margin-bottom: 6px;
  background: var(--surface); border: 0.5px solid var(--border);
}
.hd-date { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 56px; flex: 0 0 56px; }
.hd-acts { flex: 1; display: flex; gap: 6px; flex-wrap: wrap; }
.act-pill {
  padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.hd-empty { font-size: 12px; color: var(--hint); font-family: var(--font-mono); }

/* ── STATS VIEW ── */
.stats-view { padding: 16px 16px calc(var(--safe-bottom) + 80px); }
.stats-title { font-size: 11px; font-family: var(--font-mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-left: 2px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border-radius: 16px; border: 0.5px solid var(--border);
  padding: 16px 14px;
}
.stat-card .sn { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-card .sl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
.stat-card.accent-card { background: var(--accent-dim); border-color: rgba(200,241,53,0.2); }
.stat-card.accent-card .sn { color: var(--accent); }
.activity-bar { display: flex; flex-direction: column; gap: 8px; }
.abar-row { display: flex; align-items: center; gap: 10px; }
.abar-label { font-size: 12px; font-weight: 500; width: 70px; flex: 0 0 70px; color: var(--text); }
.abar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.abar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.abar-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 24px; text-align: right; }

/* ── VIEW TRANSITIONS ── */
.view { display: none; flex: 1; overflow-y: auto; }
.view.active { display: flex; flex-direction: column; }
.view::-webkit-scrollbar { display: none; }

/* Animate card expand */
@keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.card-expand.open { animation: fadeDown 0.18s ease; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="app-title">Fit<span>Track</span></div>
      <div class="week-ctrl">
        <button class="wbtn" onclick="shiftWeek(-1)">&#8592;</button>
        <span class="week-label" id="week-label"></span>
        <button class="wbtn" onclick="shiftWeek(1)">&#8594;</button>
      </div>
    </div>
    <div class="topbar-row2" id="stats-row"></div>
  </div>

  <div class="day-strip" id="day-strip"></div>

  <div id="view-today" class="view active">
    <div class="scroll-area" id="cards-area"></div>
  </div>

  <div id="view-history" class="view">
    <div class="history-view" id="history-area"></div>
  </div>

  <div id="view-stats" class="view">
    <div class="stats-view" id="stats-area"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" id="tab-today" onclick="switchView('today')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-tab" id="tab-history" onclick="switchView('history')">
      <span class="nav-icon">📋</span>
      <span class="nav-label">History</span>
    </button>
    <button class="nav-tab" id="tab-stats" onclick="switchView('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
    </button>
  </nav>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let weekOffset = 0;
let selectedDay = (TODAY.getDay()+6)%7;
let expandedId = null;
let showPicker = false;
let currentView = 'today';

function getMonday(ref) {
  const d = new Date(ref);
  const diff = d.getDay()===0 ? -6 : 1-d.getDay();
  d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d;
}
function weekMon() { return getMonday(new Date(TODAY.getTime()+weekOffset*7*86400000)); }
function dateKey(d) { return d.toISOString().slice(0,10); }
function uid() { return Math.random().toString(36).slice(2,9); }

const GYM_CYCLE = ['push','pull','legs'];
const TEMPLATE = [
  {type:'rest'},
  {type:'run',variant:'speed'},
  {type:'gym',opts:['tennis']},
  {type:'run',variant:'long'},
  {type:'swim'},
  {type:'run',variant:'long',opts:['tennis']},
  {type:'run',variant:'speed',opts:['swim']},
];
const EX_DEFAULTS = {
  push:[{n:'Bench press',s:'',r:''},{n:'Overhead press',s:'',r:''},{n:'Incline DB press',s:'',r:''},{n:'Lateral raises',s:'',r:''},{n:'Tricep dips',s:'',r:''}],
  pull:[{n:'Pull-ups',s:'',r:''},{n:'Barbell row',s:'',r:''},{n:'Cable row',s:'',r:''},{n:'Face pulls',s:'',r:''},{n:'Bicep curls',s:'',r:''}],
  legs:[{n:'Squats',s:'',r:''},{n:'Romanian deadlift',s:'',r:''},{n:'Leg press',s:'',r:''},{n:'Lunges',s:'',r:''},{n:'Calf raises',s:'',r:''}]
};

function gymPhase(mon) {
  const base = new Date(2025,0,6);
  const w = Math.round((mon-base)/(7*86400000));
  return GYM_CYCLE[((w%3)+3)%3];
}

function defaultActs(di, mon) {
  const tpl = TEMPLATE[di]; const acts = [];
  if(tpl.type==='rest') { acts.push({id:uid(),type:'rest',done:false,d:{}}); return acts; }
  if(tpl.type==='gym') {
    const phase = gymPhase(mon);
    acts.push({id:uid(),type:'gym',phase,done:false,d:{exercises:EX_DEFAULTS[phase].map(e=>({...e}))}});
  } else if(tpl.type==='run') {
    acts.push({id:uid(),type:'run',variant:tpl.variant,done:false,d:{dist:'',time:''}});
  } else if(tpl.type==='swim') {
    acts.push({id:uid(),type:'swim',done:false,d:{laps:'',time:''}});
  }
  if(tpl.opts) tpl.opts.forEach(o=>{
    if(o==='tennis') acts.push({id:uid(),type:'tennis',optional:true,done:false,d:{score:''}});
    if(o==='swim') acts.push({id:uid(),type:'swim',optional:true,done:false,d:{laps:'',time:''}});
  });
  return acts;
}

let store = {};
try { store = JSON.parse(localStorage.getItem('fittrack_v2')||'{}'); } catch(e) {}
function save() { try { localStorage.setItem('fittrack_v2', JSON.stringify(store)); } catch(e) {} }

function getDayData(date) {
  const k = dateKey(date);
  if(!store[k]) {
    const mon = getMonday(date);
    const di = (date.getDay()+6)%7;
    store[k] = { activities: defaultActs(di, mon) };
  }
  return store[k];
}

// ─── Color helpers ───
const ACT_COLORS = {
  'gym-push': {c:'var(--push)', bg:'var(--push-bg)'},
  'gym-pull': {c:'var(--pull)', bg:'var(--pull-bg)'},
  'gym-legs': {c:'var(--legs)', bg:'var(--legs-bg)'},
  'run-long': {c:'var(--run-long)', bg:'var(--run-long-bg)'},
  'run-speed':{c:'var(--run-speed)',bg:'var(--run-speed-bg)'},
  'tennis':   {c:'var(--tennis)',   bg:'var(--tennis-bg)'},
  'swim':     {c:'var(--swim)',     bg:'var(--swim-bg)'},
  'rest':     {c:'var(--rest)',     bg:'var(--rest-bg)'},
};
function actColorKey(act) {
  if(act.type==='gym') return 'gym-'+(act.phase||'push');
  if(act.type==='run') return 'run-'+(act.variant||'long');
  return act.type;
}
function actCols(act) { return ACT_COLORS[actColorKey(act)] || ACT_COLORS.rest; }
const ICONS = {gym:'🏋',run:'🏃',tennis:'🎾',swim:'🏊',rest:'😴'};
function actIcon(act) { return ICONS[act.type]||'●'; }
function actTitle(act) {
  if(act.type==='gym') return 'Gym · '+(act.phase.charAt(0).toUpperCase()+act.phase.slice(1)+' day');
  if(act.type==='run') return act.variant==='speed' ? 'Speed run' : 'Long run';
  if(act.type==='tennis') return act.optional ? 'Tennis — optional' : 'Tennis';
  if(act.type==='swim') return act.optional ? 'Swim — optional' : 'Swim';
  return 'Rest day';
}
function actSub(act) {
  if(act.type==='gym' && act.d.exercises) {
    const done = act.d.exercises.filter(e=>e.s||e.r).length;
    return done ? `${done} / ${act.d.exercises.length} exercises logged` : `${act.d.exercises.length} exercises planned`;
  }
  if(act.type==='run' && act.d.dist) return `${act.d.dist} km · ${act.d.time||'—'}`;
  if(act.type==='swim' && act.d.laps) return `${act.d.laps} laps · ${act.d.time||'—'}`;
  if(act.type==='tennis' && act.d.score) return act.d.score;
  if(act.optional) return 'Tap to log if you played';
  return 'Tap to log details';
}

// ─── Main render ───
function render() {
  renderTopBar();
  renderDayStrip();
  if(currentView==='today') renderCards();
  else if(currentView==='history') renderHistory();
  else if(currentView==='stats') renderStatsView();
}

function renderTopBar() {
  const mon = weekMon();
  const end = new Date(mon); end.setDate(end.getDate()+6);
  document.getElementById('week-label').textContent =
    mon.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' – ' +
    end.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  let total=0, done=0;
  for(let i=0;i<7;i++) {
    const d=new Date(mon); d.setDate(d.getDate()+i);
    getDayData(d).activities.forEach(a=>{ if(a.type!=='rest'){total++;if(a.done)done++;} });
  }
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('stats-row').innerHTML =
    `<div class="stat-chip"><b>${done}</b> / ${total} this week</div>`+
    (pct>=80?`<div class="stat-chip accent-chip"><b>${pct}%</b> complete</div>`:`<div class="stat-chip"><b>${pct}%</b> complete</div>`);
}

function renderDayStrip() {
  const mon = weekMon();
  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  for(let i=0;i<7;i++) {
    const d = new Date(mon); d.setDate(d.getDate()+i);
    const isToday = d.getTime()===TODAY.getTime();
    const dd = getDayData(d);
    const nonRest = dd.activities.filter(a=>a.type!=='rest');
    const chip = document.createElement('button');
    chip.className='day-chip'+(i===selectedDay?' active':'')+(isToday?' is-today':'');
    let pips = '';
    nonRest.forEach(a=>{ pips+=`<div class="dc-pip ${a.done?'done':'pending'}"></div>`; });
    chip.innerHTML=`<span class="dc-name">${DAYS[i]}</span><span class="dc-num">${d.getDate()}</span><div class="dc-pips">${pips}</div>`;
    chip.onclick=()=>{ selectedDay=i; expandedId=null; showPicker=false; render(); };
    strip.appendChild(chip);
  }
}

function renderCards() {
  const area = document.getElementById('cards-area');
  area.innerHTML = '';
  const mon = weekMon();
  const d = new Date(mon); d.setDate(d.getDate()+selectedDay);
  const dd = getDayData(d);

  if(showPicker) { renderPicker(area, d); return; }

  dd.activities.forEach(act => {
    if(act.type==='rest') {
      const rc = document.createElement('div');
      rc.className = 'act-card rest-card';
      rc.innerHTML = `<div class="rest-inner"><div class="rest-icon">😴</div><div><div class="rest-text">Rest day</div><div class="rest-sub">Gym &amp; pool closed — recharge</div></div></div>`;
      area.appendChild(rc); return;
    }
    const cols = actCols(act);
    const card = document.createElement('div');
    card.className = 'act-card'+(act.done?' done-card':'')+(act.optional?' optional-card':'');

    const main = document.createElement('div'); main.className='card-main';
    main.onclick = ()=>{ expandedId=(expandedId===act.id?null:act.id); renderCards(); };

    const icon = document.createElement('div'); icon.className='card-icon';
    icon.style.background=cols.bg; icon.textContent=actIcon(act);

    const body = document.createElement('div'); body.className='card-body';
    body.innerHTML=`<div class="card-title${act.done?' struck':''}">${actTitle(act)}</div><div class="card-sub">${actSub(act)}</div>`;

    const cbtn = document.createElement('button');
    cbtn.className='check-btn'+(act.done?' checked':'');
    cbtn.innerHTML=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    cbtn.onclick=(e)=>{ e.stopPropagation(); act.done=!act.done; save(); render(); };

    main.append(icon, body, cbtn);
    card.appendChild(main);

    const exp = document.createElement('div');
    exp.className='card-expand'+(expandedId===act.id?' open':'');
    if(expandedId===act.id) buildExpand(exp, act, d);
    card.appendChild(exp);
    area.appendChild(card);
  });

  const addBtn = document.createElement('button');
  addBtn.className='add-act-btn';
  addBtn.innerHTML=`<span class="add-icon">＋</span> Add activity`;
  addBtn.onclick=()=>{ showPicker=true; render(); };
  area.appendChild(addBtn);
}

function buildExpand(el, act, date) {
  if(act.type==='gym') buildGym(el, act);
  else if(act.type==='run') buildRun(el, act);
  else if(act.type==='swim') buildSwim(el, act);
  else if(act.type==='tennis') buildTennis(el, act);

  const row = document.createElement('div'); row.className='save-row';
  const del = document.createElement('button'); del.className='btn-del'; del.textContent='Remove';
  del.onclick=()=>{ getDayData(date).activities=getDayData(date).activities.filter(a=>a.id!==act.id); save(); expandedId=null; render(); };
  const sv = document.createElement('button'); sv.className='btn-save'; sv.textContent='Save ✓';
  sv.onclick=()=>{ save(); expandedId=null; render(); };
  row.append(del, sv); el.appendChild(row);
}

function inp(type,ph,val,cb,extra='') {
  const i=document.createElement('input'); i.type=type; i.placeholder=ph; i.value=val||'';
  if(extra) i.className=extra;
  i.addEventListener('input',e=>cb(e.target.value)); return i;
}
function fieldBlock(label, ...children) {
  const b=document.createElement('div'); b.className='field-block';
  const l=document.createElement('div'); l.className='field-lbl'; l.textContent=label;
  const r=document.createElement('div'); r.className='field-row';
  children.forEach(c=>{ if(typeof c==='string'){const u=document.createElement('span');u.className='field-unit';u.textContent=c;r.appendChild(u);}else r.appendChild(c); });
  b.append(l,r); return b;
}

function buildGym(el, act) {
  if(!act.d.exercises) act.d.exercises=[];
  const lbl=document.createElement('div'); lbl.className='field-lbl';
  lbl.textContent=act.phase.charAt(0).toUpperCase()+act.phase.slice(1)+' day';
  el.appendChild(lbl);
  const hdr=document.createElement('div'); hdr.className='ex-header';
  ['Exercise','Sets','Reps',''].forEach(t=>{ const s=document.createElement('span');s.textContent=t;hdr.appendChild(s); });
  el.appendChild(hdr);
  const list=document.createElement('div'); list.className='ex-list';
  function renderList() {
    list.innerHTML='';
    act.d.exercises.forEach((ex,i)=>{
      const row=document.createElement('div'); row.className='ex-row';
      const n=inp('text','Exercise',ex.n,v=>act.d.exercises[i].n=v,'ex-name');
      const s=inp('number','—',ex.s,v=>act.d.exercises[i].s=v,'ex-num');
      const r=inp('number','—',ex.r,v=>act.d.exercises[i].r=v,'ex-num');
      const d=document.createElement('button'); d.className='ex-del'; d.textContent='×';
      d.onclick=()=>{ act.d.exercises.splice(i,1); renderList(); };
      row.append(n,s,r,d); list.appendChild(row);
    });
    const add=document.createElement('button'); add.className='add-ex'; add.textContent='+ add exercise';
    add.onclick=()=>{ act.d.exercises.push({n:'',s:'',r:''}); renderList(); };
    list.appendChild(add);
  }
  renderList(); el.appendChild(list);
}

function buildRun(el, act) {
  el.appendChild(fieldBlock('Distance', inp('number','e.g. 8',act.d.dist,v=>act.d.dist=v), 'km'));
  el.appendChild(fieldBlock('Time', inp('text','mm:ss or h:mm:ss',act.d.time,v=>act.d.time=v)));
  const fb=document.createElement('div'); fb.className='field-block';
  const lbl=document.createElement('div'); lbl.className='field-lbl'; lbl.textContent='Run type';
  const tog=document.createElement('div'); tog.className='type-toggle';
  ['long','speed'].forEach(v=>{
    const b=document.createElement('button'); b.textContent=v==='long'?'Long run':'Speed run';
    if(act.variant===v) b.classList.add('active');
    b.onclick=()=>{ act.variant=v; tog.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    tog.appendChild(b);
  });
  fb.append(lbl,tog); el.appendChild(fb);
}

function buildSwim(el, act) {
  el.appendChild(fieldBlock('Laps', inp('number','e.g. 40',act.d.laps,v=>act.d.laps=v), 'laps'));
  el.appendChild(fieldBlock('Time', inp('text','mm:ss',act.d.time,v=>act.d.time=v)));
}

function buildTennis(el, act) {
  el.appendChild(fieldBlock('Score / result', inp('text','e.g. 6-4, 7-5',act.d.score,v=>act.d.score=v)));
}

function renderPicker(area, date) {
  const p=document.createElement('div'); p.className='type-picker';
  const t=document.createElement('div'); t.className='picker-title'; t.textContent='Add activity';
  const grid=document.createElement('div'); grid.className='picker-grid';
  [{type:'gym',icon:'🏋',label:'Gym'},{type:'run',icon:'🏃',label:'Run'},{type:'tennis',icon:'🎾',label:'Tennis'},{type:'swim',icon:'🏊',label:'Swim'}].forEach(({type,icon,label})=>{
    const b=document.createElement('button'); b.className='picker-btn';
    b.innerHTML=`<span class="picker-icon">${icon}</span><span class="picker-label">${label}</span>`;
    b.onclick=()=>{
      const act={id:uid(),type,done:false,d:{}};
      if(type==='gym'){ act.phase=gymPhase(weekMon()); act.d={exercises:EX_DEFAULTS[act.phase].map(e=>({...e}))}; }
      if(type==='run'){ act.variant='long'; act.d={dist:'',time:''}; }
      if(type==='swim'){ act.d={laps:'',time:''}; }
      if(type==='tennis'){ act.d={score:''}; }
      getDayData(date).activities.push(act);
      save(); showPicker=false; expandedId=act.id; render();
    };
    grid.appendChild(b);
  });
  const cancel=document.createElement('button'); cancel.className='picker-cancel'; cancel.textContent='Cancel';
  cancel.onclick=()=>{ showPicker=false; render(); };
  p.append(t,grid,cancel); area.appendChild(p);
}

// ─── History view ───
function renderHistory() {
  const area = document.getElementById('history-area');
  area.innerHTML='';
  const weeks = [];
  for(let w=-3; w<=0; w++) {
    const mon = getMonday(new Date(TODAY.getTime()+w*7*86400000));
    const end = new Date(mon); end.setDate(end.getDate()+6);
    const weekEl = document.createElement('div'); weekEl.className='history-week';
    const wLabel = document.createElement('div'); wLabel.className='history-week-title';
    wLabel.textContent = w===0 ? 'This week' : mon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+end.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    weekEl.appendChild(wLabel);
    for(let i=0;i<7;i++) {
      const d=new Date(mon); d.setDate(d.getDate()+i);
      if(d>TODAY) continue;
      const dd=getDayData(d);
      const nonRest=dd.activities.filter(a=>a.type!=='rest');
      if(!nonRest.length) continue;
      const row=document.createElement('div'); row.className='history-day';
      const dt=document.createElement('div'); dt.className='hd-date';
      dt.textContent=DAYS[i]+' '+d.getDate();
      const acts=document.createElement('div'); acts.className='hd-acts';
      if(!nonRest.length){ acts.innerHTML='<span class="hd-empty">Rest</span>'; }
      else nonRest.forEach(a=>{
        const cols=actCols(a);
        const pill=document.createElement('div'); pill.className='act-pill';
        pill.style.background=cols.bg; pill.style.color=cols.c;
        pill.textContent=(a.done?'✓ ':'')+actTitle(a).split(' · ')[0];
        acts.appendChild(pill);
      });
      row.append(dt,acts); weekEl.appendChild(row);
    }
    area.appendChild(weekEl);
  }
}

// ─── Stats view ───
function renderStatsView() {
  const area = document.getElementById('stats-area');
  area.innerHTML='';
  const counts={gym:0,run:0,tennis:0,swim:0};
  let totalDone=0, totalActs=0, runKm=0, swimLaps=0;
  const allKeys=Object.keys(store);
  allKeys.forEach(k=>{
    store[k].activities.forEach(a=>{
      if(a.type==='rest') return;
      totalActs++;
      if(a.done){
        totalDone++;
        counts[a.type]=(counts[a.type]||0)+1;
        if(a.type==='run'&&a.d.dist) runKm+=parseFloat(a.d.dist)||0;
        if(a.type==='swim'&&a.d.laps) swimLaps+=parseInt(a.d.laps)||0;
      }
    });
  });

  const t=document.createElement('div'); t.className='stats-title'; t.textContent='All time';
  area.appendChild(t);
  const grid=document.createElement('div'); grid.className='stats-grid';
  [{n:totalDone,l:'Activities done'},{n:Math.round(runKm*10)/10+'km',l:'Total distance run'},{n:swimLaps,l:'Laps swum'},{n:totalActs?Math.round(totalDone/totalActs*100)+'%':'-',l:'Completion rate',accent:true}]
  .forEach(({n,l,accent})=>{
    const c=document.createElement('div'); c.className='stat-card'+(accent?' accent-card':'');
    c.innerHTML=`<div class="sn">${n}</div><div class="sl">${l}</div>`;
    grid.appendChild(c);
  });
  area.appendChild(grid);

  const t2=document.createElement('div'); t2.className='stats-title'; t2.textContent='By activity'; area.appendChild(t2);
  const bars=document.createElement('div'); bars.className='activity-bar';
  const maxC=Math.max(...Object.values(counts),1);
  [{type:'gym',label:'Gym',col:'var(--push)'},{type:'run',label:'Run',col:'var(--run-long)'},{type:'tennis',label:'Tennis',col:'var(--tennis)'},{type:'swim',label:'Swim',col:'var(--swim)'}]
  .forEach(({type,label,col})=>{
    const c=counts[type]||0;
    const row=document.createElement('div'); row.className='abar-row';
    row.innerHTML=`<div class="abar-label">${label}</div><div class="abar-track"><div class="abar-fill" style="width:${Math.round(c/maxC*100)}%;background:${col}"></div></div><div class="abar-count">${c}</div>`;
    bars.appendChild(row);
  });
  area.appendChild(bars);
}

function switchView(v) {
  currentView=v;
  ['today','history','stats'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('active',x===v);
    document.getElementById('tab-'+x).classList.toggle('active',x===v);
  });
  render();
}

function shiftWeek(dir) { weekOffset+=dir; expandedId=null; showPicker=false; render(); }

// ─── Service Worker ───
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

render();
</script>
</body>
